name: Supabase Validation

on:
  pull_request:
    branches:
      - development
      - main
    paths:
      - apps/supabase/**
      - .github/workflows/supabase-validation.yml
  push:
    branches:
      - development
      - main
    paths:
      - apps/supabase/**
      - .github/workflows/supabase-validation.yml
  workflow_run:
    workflows:
      - Supabase Deploy
    types:
      - completed
  workflow_dispatch:
    inputs:
      target_environment:
        description: Supabase validation target.
        required: true
        type: choice
        default: local
        options:
          - local
          - staging
          - production

permissions:
  contents: read

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  PNPM_VERSION: "10.23.0"
  SUPABASE_CLI_VERSION: "2.90.0"

jobs:
  local:
    name: Local migration, RLS, and advisor validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'local')
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ci-openai-placeholder
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ci-google-client-id.apps.googleusercontent.com
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET: ci-google-client-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start local Supabase database
        run: supabase --workdir apps/supabase db start

      - name: Reset local database with migrations and seed
        run: supabase --workdir apps/supabase db reset

      - name: Run pgTAP tests
        run: supabase --workdir apps/supabase test db

      - name: Run local advisors
        run: supabase --workdir apps/supabase db advisors --local --type all --fail-on warn

  remote-staging:
    name: Remote privacy validation for staging
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'development') || (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'staging')
    environment: staging
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MEDPROOF_PRIVACY_SENTINELS: ${{ vars.MEDPROOF_PRIVACY_SENTINELS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Run remote privacy validation
        working-directory: apps/web
        run: pnpm validate:privacy

  remote-production:
    name: Remote privacy validation for production
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'production')
    environment: production
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MEDPROOF_PRIVACY_SENTINELS: ${{ vars.MEDPROOF_PRIVACY_SENTINELS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Run remote privacy validation
        working-directory: apps/web
        run: pnpm validate:privacy
