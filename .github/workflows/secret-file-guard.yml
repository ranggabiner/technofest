name: Secret File Guard

on:
  pull_request:
    branches:
      - development
      - main
    paths:
      - .env
      - .env.*
      - "**/.env"
      - "**/.env.*"
      - env.local
      - "**/env.local"
      - .github/workflows/secret-file-guard.yml
      - "!**/*.example"
  push:
    branches:
      - development
      - main
    paths:
      - .env
      - .env.*
      - "**/.env"
      - "**/.env.*"
      - env.local
      - "**/env.local"
      - .github/workflows/secret-file-guard.yml
      - "!**/*.example"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    name: Block committed real env files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block committed real env files
        shell: bash
        run: |
          bad_files=()

          while IFS= read -r file; do
            case "$file" in
              *.example)
                continue
                ;;
            esac

            case "$file" in
              .env|.env.*|*/.env|*/.env.*|env.local|*/env.local)
                bad_files+=("$file")
                ;;
            esac
          done < <(git ls-files)

          if [ "${#bad_files[@]}" -gt 0 ]; then
            printf 'Real env files must not be committed:\n'
            printf ' - %s\n' "${bad_files[@]}"
            exit 1
          fi
