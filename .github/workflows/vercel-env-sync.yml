name: Vercel Env Sync

on:
  push:
    branches:
      - development
      - main
    paths:
      - apps/web/scripts/vercel-env-sync.mjs
      - apps/web/.env.staging.example
      - apps/web/.env.production.example
      - .github/workflows/vercel-env-sync.yml
  workflow_dispatch:
    inputs:
      target_environment:
        description: Vercel environment values to sync.
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: vercel-env-sync-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  staging:
    name: Sync Vercel preview env for development
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref_name == 'development') || (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'staging')
    environment: staging
    env:
      VERCEL_ENV_SYNC_TARGET: staging
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      ADMIN_EMAIL_ALLOWLIST: ${{ secrets.ADMIN_EMAIL_ALLOWLIST }}
      ENCRYPTION_MASTER_KEY: ${{ secrets.ENCRYPTION_MASTER_KEY }}
      HASH_PEPPER: ${{ secrets.HASH_PEPPER }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ vars.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      AMOY_RPC_URL: ${{ vars.AMOY_RPC_URL }}
      RELAYER_PRIVATE_KEY: ${{ secrets.RELAYER_PRIVATE_KEY }}
      MEDPROOF_CONTRACT_ADDRESS: ${{ vars.MEDPROOF_CONTRACT_ADDRESS }}
      NEXT_PUBLIC_MEDPROOF_CONTRACT_ADDRESS: ${{ vars.NEXT_PUBLIC_MEDPROOF_CONTRACT_ADDRESS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate target branch
        shell: bash
        run: |
          if [ "$GITHUB_REF_NAME" != "development" ]; then
            echo "Staging Vercel env sync must run from the development branch."
            exit 1
          fi

      - name: Upsert Vercel environment variables
        run: node apps/web/scripts/vercel-env-sync.mjs

  production:
    name: Sync Vercel production env
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'production')
    environment: production
    env:
      VERCEL_ENV_SYNC_TARGET: production
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      ADMIN_EMAIL_ALLOWLIST: ${{ secrets.ADMIN_EMAIL_ALLOWLIST }}
      ENCRYPTION_MASTER_KEY: ${{ secrets.ENCRYPTION_MASTER_KEY }}
      HASH_PEPPER: ${{ secrets.HASH_PEPPER }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ vars.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      AMOY_RPC_URL: ${{ vars.AMOY_RPC_URL }}
      RELAYER_PRIVATE_KEY: ${{ secrets.RELAYER_PRIVATE_KEY }}
      MEDPROOF_CONTRACT_ADDRESS: ${{ vars.MEDPROOF_CONTRACT_ADDRESS }}
      NEXT_PUBLIC_MEDPROOF_CONTRACT_ADDRESS: ${{ vars.NEXT_PUBLIC_MEDPROOF_CONTRACT_ADDRESS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate target branch
        shell: bash
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Production Vercel env sync must run from main."
            exit 1
          fi

      - name: Upsert Vercel environment variables
        run: node apps/web/scripts/vercel-env-sync.mjs
