name: Supabase Deploy

on:
  push:
    branches:
      - development
      - main
    paths:
      - apps/supabase/supabase/config.toml
      - apps/supabase/supabase/migrations/**
      - .github/workflows/supabase-deploy.yml
  workflow_dispatch:
    inputs:
      target_environment:
        description: Supabase environment to deploy.
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: supabase-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  SUPABASE_CLI_VERSION: "2.90.0"

jobs:
  staging:
    name: Deploy Supabase migrations to staging
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref_name == 'development') || (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'staging')
    environment: staging
    env:
      TARGET_ENVIRONMENT: staging
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate target branch and secrets
        shell: bash
        run: |
          if [ "$TARGET_ENVIRONMENT" != "staging" ] || [ "$GITHUB_REF_NAME" != "development" ]; then
            echo "Staging Supabase deploys must run from the development branch."
            exit 1
          fi

          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "SUPABASE_ACCESS_TOKEN is required."; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "SUPABASE_DB_PASSWORD is required."; exit 1; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "SUPABASE_PROJECT_REF is required."; exit 1; }

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Link staging Supabase project
        run: supabase --workdir apps/supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Preview migration changes
        run: supabase --workdir apps/supabase db push --linked --dry-run

      - name: Apply migrations
        run: supabase --workdir apps/supabase db push --linked

      - name: List linked migrations
        run: supabase --workdir apps/supabase migration list --linked

      - name: Refresh PostgREST schema cache
        run: |
          supabase --workdir apps/supabase db query --linked "notify pgrst, 'reload schema'"
          supabase --workdir apps/supabase db query --linked "select pg_notification_queue_usage()"

  production:
    name: Deploy Supabase migrations to production
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'production')
    environment: production
    env:
      TARGET_ENVIRONMENT: production
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate target branch and secrets
        shell: bash
        run: |
          if [ "$TARGET_ENVIRONMENT" != "production" ]; then
            echo "Production Supabase deploy job received a non-production target."
            exit 1
          fi

          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Production Supabase deploys must run from main."
            exit 1
          fi

          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "SUPABASE_ACCESS_TOKEN is required."; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "SUPABASE_DB_PASSWORD is required."; exit 1; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "SUPABASE_PROJECT_REF is required."; exit 1; }

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Link production Supabase project
        run: supabase --workdir apps/supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Preview migration changes
        run: supabase --workdir apps/supabase db push --linked --dry-run

      - name: Apply migrations
        run: supabase --workdir apps/supabase db push --linked

      - name: List linked migrations
        run: supabase --workdir apps/supabase migration list --linked

      - name: Refresh PostgREST schema cache
        run: |
          supabase --workdir apps/supabase db query --linked "notify pgrst, 'reload schema'"
          supabase --workdir apps/supabase db query --linked "select pg_notification_queue_usage()"
